<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt — URBAN HILT</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: Georgia, 'Times New Roman', serif; margin: 0; padding: 24px; background: #f5f5f5; color: #1a1a1a; }
    .rec-wrap { max-width: 400px; margin: 0 auto; background: #fff; padding: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .rec-brand { font-size: 1.35rem; font-weight: 700; letter-spacing: 0.15em; text-align: center; }
    .rec-tag { text-align: center; font-size: 0.75rem; color: #666; margin-top: 4px; }
    .rec-divider { border-top: 1px dashed #ccc; margin: 14px 0; }
    .rec-row { display: flex; justify-content: space-between; font-size: 0.88rem; margin: 6px 0; }
    .rec-total { font-weight: 700; font-size: 1.05rem; margin-top: 8px; padding-top: 8px; border-top: 2px solid #1a1a1a; }
    .rec-cust { font-size: 0.85rem; line-height: 1.5; }
    .rec-items { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin: 8px 0; }
    .rec-items th, .rec-items td { padding: 6px 0; border-bottom: 1px solid #eee; }
    .rec-items .r { text-align: right; }
    .rec-foot { text-align: center; font-size: 0.8rem; color: #666; margin-top: 20px; }
    .rec-err { color: #b91c1c; padding: 20px; text-align: center; }
    .rec-err a { color: #1d4ed8; }
    .rec-print-btn {
      display: block; width: 100%; max-width: 400px; margin: 16px auto 0;
      padding: 12px; font-size: 0.95rem; cursor: pointer; border: none; border-radius: 8px;
      background: #1a1a1a; color: #c9a96e; font-weight: 600;
    }
    @media print {
      body { background: #fff; padding: 0; }
      .no-print { display: none !important; }
      .rec-wrap { box-shadow: none; max-width: none; }
    }
  </style>
</head>
<body>
  <div class="rec-wrap" id="receiptRoot"><p style="text-align:center;color:#666;">Loading…</p></div>
  <script src="/js/receipt.js"></script>
</body>
</html>
