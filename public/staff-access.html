<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Access — URBAN HILT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .staff-gate-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(145deg, #0d0d0d 0%, #1a1510 50%, #0d0d0d 100%); padding: 24px; }
    .staff-gate-card { max-width: 420px; width: 100%; background: rgba(26,26,26,0.95); border: 1px solid rgba(201,169,110,0.25); border-radius: 16px; padding: 2.5rem; box-shadow: 0 24px 80px rgba(0,0,0,0.5); }
    .staff-gate-card h1 { font-family: 'Playfair Display', serif; color: #c9a96e; font-size: 1.75rem; margin-bottom: 0.5rem; text-align: center; }
    .staff-gate-card p { color: rgba(255,255,255,0.6); text-align: center; font-size: 0.9rem; margin-bottom: 1.75rem; }
    .staff-gate-card input { width: 100%; padding: 14px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: #111; color: #fff; font-size: 1.25rem; letter-spacing: 0.2em; text-align: center; margin-bottom: 1rem; }
    .staff-gate-card button { width: 100%; padding: 14px; border: none; border-radius: 8px; background: #c9a96e; color: #111; font-weight: 600; cursor: pointer; font-size: 1rem; }
    .staff-gate-card button:hover { filter: brightness(1.08); }
    .staff-gate-error { color: #f87171; text-align: center; font-size: 0.875rem; margin-top: 0.75rem; min-height: 1.25rem; }
    .staff-gate-back { display: block; text-align: center; margin-top: 1.5rem; color: #c9a96e; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="staff-gate-page">
    <div class="staff-gate-card">
      <h1><i class="fas fa-user-shield"></i> Staff Access</h1>
      <p>Enter your sales PIN for POS and order tools. Your profile is shown after sign-in. All sign-ins are logged.</p>
      <form id="staffGateForm">
        <input type="password" id="staffPin" inputmode="numeric" autocomplete="one-time-code" placeholder="••••" required minlength="4" maxlength="12">
        <button type="submit"><i class="fas fa-unlock"></i> Continue</button>
      </form>
      <div class="staff-gate-error" id="staffGateError"></div>
      <a href="/" class="staff-gate-back"><i class="fas fa-arrow-left"></i> Back to store</a>
    </div>
  </div>
  <script src="/js/main.js"></script>
  <script>
    document.getElementById('staffGateForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('staffGateError');
      err.textContent = '';
      const pin = document.getElementById('staffPin').value;
      const res = await fetch('/api/staff/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin }),
      });
      const data = await res.json();
      if (data.token) {
        UH.setStaffToken(data.token);
        sessionStorage.setItem('uh_staff_name', data.staff?.name || 'Staff');
        try {
          if (data.staff) sessionStorage.setItem('uh_staff_profile', JSON.stringify(data.staff));
        } catch (e) { /* ignore */ }
        const ret = new URLSearchParams(location.search).get('return') || '/';
        window.location.href = ret.startsWith('/') ? ret : '/';
      } else {
        err.textContent = data.error || 'Invalid PIN';
      }
    });
  </script>
</body>
</html>
